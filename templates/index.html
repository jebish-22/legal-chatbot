<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal Bot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>Legal Bot ⚖️</h2>
            <p>Your AI assistant for legal information in India.</p>
        </div>
        <div id="chat-box" class="chat-box">
            <div class="message bot-message">
                <p>Describe your situation, and I'll do my best to guide you. Please note, this is not legal advice.</p>
            </div>

            <div id="typing-indicator" class="message bot-message hidden">
                <span></span><span></span><span></span>
            </div>
        </div>

        <div class="input-area-wrapper">
            <div id="button-container-wrapper"></div>
            <form id="chat-form" class="chat-input-form">
                <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off" required>
                <button type="submit">Send</button>
            </form>
        </div>
    </div>
    <script src="/static/script.js" defer></script>
</body>
</html>
